<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  
  <rect width="1080" height="1350" fill="#F4F1E9"/>
  <rect x="48" y="48" width="984" height="1254" fill="none" stroke="#CFC9B8" stroke-width="2"/>
  <g font-family="Liberation Mono, DejaVu Sans Mono" font-size="26" letter-spacing="6" fill="#16181D">
    <text x="84" y="120">INDEXA</text>
    <text x="84" y="158" fill="#5B5C57" font-size="22" letter-spacing="4">RESEARCH NOTES</text>
    <text x="996" y="120" text-anchor="end">02 / 03</text>
  </g>
  <line x1="84" y1="190" x2="996" y2="190" stroke="#CFC9B8" stroke-width="2"/>

  <text x="84" y="300" font-family="Liberation Mono, DejaVu Sans Mono" font-size="22" letter-spacing="3" fill="#3D34C9">01 — SIMPLE VERSION</text>
  <g font-family="DejaVu Serif" font-weight="bold" font-size="64">
    <text x="80" y="410" fill="#16181D">A</text>
    <text x="152" y="410" fill="#3D34C9">short chain</text>
    <text x="80" y="490" fill="#16181D">of amino acids.</text>
  </g>
  <!-- diagrams -->
  <text x="84" y="640" font-family="Liberation Mono, DejaVu Sans Mono" font-size="22" letter-spacing="3" fill="#5B5C57">SHORT CHAIN — a signal</text>
  <g><line x1="145.0" y1="700" x2="355.0" y2="700" stroke="#16181D" stroke-width="3"/><circle cx="145.0" cy="700" r="22" fill="#3D34C9" stroke="#16181D" stroke-width="3"/><circle cx="215.0" cy="700" r="22" fill="#3D34C9" stroke="#16181D" stroke-width="3"/><circle cx="285.0" cy="700" r="22" fill="#3D34C9" stroke="#16181D" stroke-width="3"/><circle cx="355.0" cy="700" r="22" fill="#3D34C9" stroke="#16181D" stroke-width="3"/></g>
  <text x="84" y="820" font-family="Liberation Mono, DejaVu Sans Mono" font-size="22" letter-spacing="3" fill="#5B5C57">LONG CHAIN — a protein</text>
  <g>
    <line x1="120" y1="880" x2="900" y2="880" stroke="#16181D" stroke-width="3"/>
    <circle cx="120" cy="880" r="16" fill="#16181D"/><circle cx="172" cy="880" r="16" fill="#16181D"/><circle cx="224" cy="880" r="16" fill="#16181D"/><circle cx="276" cy="880" r="16" fill="#16181D"/><circle cx="328" cy="880" r="16" fill="#16181D"/><circle cx="380" cy="880" r="16" fill="#16181D"/><circle cx="432" cy="880" r="16" fill="#16181D"/><circle cx="484" cy="880" r="16" fill="#16181D"/><circle cx="536" cy="880" r="16" fill="#16181D"/><circle cx="588" cy="880" r="16" fill="#16181D"/><circle cx="640" cy="880" r="16" fill="#16181D"/><circle cx="692" cy="880" r="16" fill="#16181D"/><circle cx="744" cy="880" r="16" fill="#16181D"/><circle cx="796" cy="880" r="16" fill="#16181D"/><circle cx="848" cy="880" r="16" fill="#16181D"/>
  </g>
  <g font-family="Liberation Sans, DejaVu Sans" font-size="32" fill="#5B5C57">
    <text x="84" y="990">Long chains are proteins. The short ones are</text>
    <text x="84" y="1035">different — and your body already makes thousands</text>
    <text x="84" y="1080">of them as signaling molecules.</text>
  </g>
  
  <line x1="84" y1="1200" x2="996" y2="1200" stroke="#CFC9B8" stroke-width="2"/>
  <g font-family="Liberation Mono, DejaVu Sans Mono" font-size="22" letter-spacing="3" fill="#5B5C57">
    <text x="84" y="1240">@indexalabs</text>
    <text x="996" y="1240" text-anchor="end">DEFINITION</text>
    <text x="84" y="1272" font-size="18" letter-spacing="1">FOR RESEARCH &amp; EDUCATIONAL USE ONLY — NOT MEDICAL ADVICE</text>
  </g>

</svg>