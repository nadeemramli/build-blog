<!-- Canvasm notification email: ALERT
     Subject: ⚠ Alert: {{cardTitle}} {{condition}}
     Vars: {{cardTitle}} {{condition}} {{value}} {{threshold}} {{canvasName}} {{ctaUrl}} {{preferencesUrl}} {{year}} -->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Metric alert</title>
  </head>
  <body style="margin:0; padding:0; background:#f4f5f7; -webkit-font-smoothing:antialiased; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f5f7;">
      <tr>
        <td align="center" style="padding:32px 16px;">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px; width:100%; background:#ffffff; border:1px solid #e5e7eb; border-radius:14px; overflow:hidden;">
            <tr>
              <td style="padding:24px 32px 8px; border-bottom:1px solid #f1f2f4;">
                <span style="font-size:18px; font-weight:700; letter-spacing:-0.02em; color:#111827;">Canvasm</span>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px 8px;">
                <p style="margin:0 0 6px; font-size:13px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; color:#dc2626;">&#9888; Metric alert</p>
                <h1 style="margin:0 0 16px; font-size:20px; line-height:1.35; font-weight:700; color:#111827;">
                  {{cardTitle}} {{condition}}
                </h1>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fef2f2; border:1px solid #fee2e2; border-radius:10px;">
                  <tr>
                    <td style="padding:16px 18px;">
                      <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                        <tr>
                          <td style="font-size:13px; color:#991b1b; padding-bottom:2px;">Current value</td>
                          <td align="right" style="font-size:18px; font-weight:700; color:#b91c1c;">{{value}}</td>
                        </tr>
                        <tr>
                          <td style="font-size:13px; color:#b45309;">Threshold</td>
                          <td align="right" style="font-size:14px; font-weight:600; color:#a16207;">{{threshold}}</td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
                <p style="margin:16px 0 0; font-size:14px; line-height:1.6; color:#6b7280;">
                  Triggered in <strong style="color:#111827;">{{canvasName}}</strong>.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:22px 32px 30px;">
                <table role="presentation" cellpadding="0" cellspacing="0">
                  <tr>
                    <td style="border-radius:9px; background:#dc2626;">
                      <a href="{{ctaUrl}}" target="_blank" style="display:inline-block; padding:12px 22px; font-size:15px; font-weight:600; color:#ffffff; text-decoration:none; border-radius:9px;">
                        Investigate &rarr;
                      </a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 32px 26px; border-top:1px solid #f1f2f4; background:#fbfbfc;">
                <p style="margin:0 0 6px; font-size:12px; line-height:1.5; color:#9ca3af;">
                  You're receiving this because email notifications for alerts are on.
                  <a href="{{preferencesUrl}}" style="color:#6b7280; text-decoration:underline;">Manage notification preferences</a>.
                </p>
                <p style="margin:0; font-size:12px; color:#c0c4cc;">&copy; {{year}} Canvasm</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
